<body>

<!-- 左上角永遠顯示你的角色+衣服 -->
<div class="myAvatarBox">
  <div class="baseAvatar">
    <div class="avaHair"></div>
    <div class="avaBody">
      <div class="eyeL"></div>
      <div class="eyeR"></div>
      <div class="blushL"></div>
      <div class="blushR"></div>
    </div>
    <!-- 衣服層 會隨購買切換 class -->
    <div class="clothLayer cloth0" id="nowCloth"></div>
  </div>
</div>

<!-- 頂部金幣 -->
<div class="top-bar">
  <button class="back-btn" onclick="goMap()">返回地圖</button>
  &nbsp;&nbsp;💰 金幣：<span id="coinNum">0</span>
</div>

<!-- 地圖 -->
<div id="mapPage" class="page active">
  <div class="map-title">🌍 Funstudying 大世界地圖</div>
  <button class="room-btn study-room" onclick="goPage('studyPage')">📚 學習房</button>
  <button class="room-btn rest-room" onclick="goPage('restPage')">☁️ 休息室</button><br>
  <button class="room-btn chat-room" onclick="goPage('chatPage')">💬 聊天娛樂房</button>
  <button class="room-btn shop-room" onclick="goPage('shopPage')">👗 換衣商城</button>
</div>

<!-- 學習房 -->
<div id="studyPage" class="page">
  <h1>📖 專心計時學習</h1>
  <div class="timer-box" id="timer">25:00</div>
  <button class="ctrl-btn" onclick="startTimer()">開始</button>
  <button class="ctrl-btn" onclick="pauseTimer()">暫停</button>
  <button class="ctrl-btn" onclick="endStudy()">完成 +50金幣</button>
</div>

<!-- 休息室 -->
<div id="restPage" class="page">
  <h1>☁️ 輕鬆休息區</h1>
  <p style="margin-top:40px;font-size:20px;">放鬆眼睛、調整心情～</p>
</div>

<!-- 聊天房 -->
<div id="chatPage" class="page">
  <h1>💬 好友聊天房</h1>
  <textarea placeholder="和朋友互相打氣留言..."></textarea>
</div>

<!-- 換衣商城 -->
<div id="shopPage" class="page">
  <h1>👗 服裝商城（買完立刻看角色變化）</h1>
  <div class="cloth-item" onclick="buyCloth(100,1)">粉紅校服 💰100</div>
  <div class="cloth-item" onclick="buyCloth(150,2)">藍色運動服 💰150</div>
  <div class="cloth-item" onclick="buyCloth(200,3)">暖黃可愛裙 💰200</div>
  <p style="margin-top:30px;">左上方小人會立刻換上新衣服！</p>
</div>

<script>
// 讀取儲存
let coins = parseInt(localStorage.getItem("myCoin")) || 0;
let clothId = parseInt(localStorage.getItem("myCloth")) || 0;

document.getElementById("coinNum").innerText = coins;
document.getElementById("nowCloth").className = "clothLayer cloth"+clothId;

// 頁面切換
function goPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goMap(){goPage("mapPage");}

// 計時器
let time = 25*60;
let run = false;
let timer;
function upT(){
  let m=Math.floor(time/60),s=time%60;
  document.getElementById("timer").innerText=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
}
function startTimer(){if(run)return;run=1;timer=setInterval(()=>time>0&&time--,1000);upT();}
function pauseTimer(){run=0;clearInterval(timer);}

// 賺金幣
function endStudy(){
  pauseTimer();
  coins +=50;
  localStorage.setItem("myCoin",coins);
  document.getElementById("coinNum").innerText=coins;
  alert("學習完成！+50金幣 ✨");
  time=25*60;upT();
}

// 買衣服＋立刻換角色外觀
function buyCloth(price,cid){
  if(coins>=price){
    coins -= price;
    clothId = cid;
    localStorage.setItem("myCoin",coins);
    localStorage.setItem("myCloth",clothId);
    document.getElementById("coinNum").innerText=coins;
    document.getElementById("nowCloth").className="clothLayer cloth"+cid;
    alert("購買成功！左上方小人已換新衣～");
  }else{
    alert("金幣不足，快去學習賺錢！");
  }
}
upT();
</script>

</body>
</html>
