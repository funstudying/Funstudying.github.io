<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡通纯代码教室｜仿CoStudy</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {
  background: #E8F4FF;
  font-family: sans-serif;
  text-align: center;
  padding:20px;
}
h1 {color:#4477AA;margin-bottom:20px;}

/* 纯代码绘制 俯视教室地板 */
.classroom {
  width: 90%;
  max-width:800px;
  height:500px;
  margin:0 auto;
  background:#C2E0C2;
  border:20px solid #99BB99;
  border-radius:16px;
  position:relative;
  overflow:hidden;
}

/* 黑板 纯代码 */
.blackboard {
  width:70%;
  height:80px;
  background:#224422;
  margin:10px auto;
  border-radius:8px;
}

/* 课桌格子 纯代码排版 */
.desk-row {
  display:flex;
  justify-content:center;
  gap:20px;
  margin:15px 0;
}
.desk {
  width:70px;
  height:50px;
  background:#A67C52;
  border-radius:6px;
  position:relative;
  cursor:pointer;
  transition:0.2s;
}
.desk:hover {transform:scale(1.05);box-shadow:0 0 8px #888;}

/* 纯代码卡通小人 无图片 */
.student {
  width:30px;
  height:36px;
  background:#FFB6C1;
  border-radius:50% 50% 40% 40%;
  position:absolute;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  display:none;
}
/* 小人头发 */
.student::before{
  content:"";
  width:26px;height:12px;
  background:#333;
  border-radius:50%;
  position:absolute;
  top:-4px;left:2px;
}

/* 入座/下课动画 */
@keyframes sitIn {
  0%{transform:translateX(-50%) translateY(-20px);opacity:0;}
  100%{transform:translateX(-50%) translateY(0);opacity:1;}
}
@keyframes packUp {
  0%{opacity:1;}
  100%{opacity:0;transform:translateX(-50%) translateY(-30px);}
}
</style>
</head>
<body>

<h1>🍭 纯代码卡通自习教室（仿CoStudy）</h1>
<p>点击课桌入座｜无背景图片·全代码绘制</p><br>

<div class="classroom">
  <!-- 纯代码黑板 -->
  <div class="blackboard"></div>

  <!-- 第一排课桌 -->
  <div class="desk-row">
    <div class="desk" onclick="sit(this)">
      <div class="student"></div>
    </div>
    <div class="desk" onclick="sit(this)">
      <div class="student"></div>
    </div>
    <div class="desk" onclick="sit(this)">
      <div class="student"></div>
    </div>
  </div>

  <!-- 第二排课桌 -->
  <div class="desk-row">
    <div class="desk" onclick="sit(this)">
      <div class="student"></div>
    </div>
    <div class="desk" onclick="sit(this)">
      <div class="student"></div>
    </div>
    <div class="desk" onclick="sit(this)">
      <div class="student"></div>
    </div>
  </div>

</div>

<br>
<button style="padding:10px 25px;font-size:16px;" onclick="classOver()">🔔下课收桌离开</button>

<script>
// 点击课桌：小人入座动画
function sit(deskEl){
  const avatar = deskEl.querySelector('.student');
  avatar.style.display = 'block';
  avatar.style.animation = "sitIn 0.5s ease forwards";
}

// 下课：全体小人收桌离开动画
function classOver(){
  const allAvatar = document.querySelectorAll('.student');
  allAvatar.forEach(av=>{
    av.style.animation = "packUp 0.8s ease forwards";
    setTimeout(()=>av.style.display='none',800);
  });
}
</script>

</body>
</html>
