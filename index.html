<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funstudying 多人专注自习室</title>
<style>
body{margin:0;padding:0;background:#f2f6fc;font-family:sans-serif;}
header{background:#2b7cd3;color:white;text-align:center;padding:22px;}
.container{max-width:800px;margin:30px auto;padding:0 20px;}
.card{background:#fff;border-radius:14px;padding:25px;margin-bottom:20px;box-shadow:0 3px 12px #d8e4f2;}
h2{color:#2b7cd3;margin-top:0;}
.timer-box{font-size:60px;text-align:center;color:#222;margin:20px 0;}
.btn{padding:11px 28px;border:none;border-radius:8px;background:#2b7cd3;color:white;font-size:16px;margin:6px;cursor:pointer;}
.btn:hover{opacity:0.9;}
textarea{width:100%;height:130px;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:15px;box-sizing:border-box;}
</style>
</head>
<body>

<header>
<h1>📚 Funstudying 多人在线自习室</h1>
<p>全班同时进入 · 免费永久使用</p>
</header>

<div class="container">
<div class="card">
<h2>⏱ 番茄专注计时器</h2>
<div class="timer-box" id="timer">25:00</div>
<div style="text-align:center;">
<button class="btn" onclick="startTimer()">开始专注</button>
<button class="btn" onclick="pauseTimer()">暂停</button>
<button class="btn" onclick="resetTimer()">重置</button>
</div>
</div>

<div class="card">
<h2>📢 班级公告栏</h2>
<p>今日一起专心自习，互相监督，一起进步！</p>
</div>

<div class="card">
<h2>💬 学习计划留言区</h2>
<textarea placeholder="写下你今天要完成的学习任务..."></textarea>
</div>
</div>

<script>
let time = 25 * 60;
let run = false;
let interval;

function update(){
let m = Math.floor(time/60), s = time%60;
document.getElementById("timer").innerText
=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
}

function startTimer(){
if(run)return;run=true;
interval=setInterval(()=>{
if(time>0){time--;update();}
else{clearInterval(interval);run=false;alert("专注结束！休息一下～");}
},1000);
}

function pauseTimer(){run=false;clearInterval(interval);}
function resetTimer(){pauseTimer();time=25*60;update();}
update();
</script>

</body>
</html>
