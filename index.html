<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funstudying｜精致建筑大地图+刷新按钮全套</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"微软雅黑",sans-serif;overflow:hidden;}

/* 右上角刷新按钮 */
.refresh-btn{
  position: fixed;
  top: 12px;
  right: 20px;
  z-index: 9999;
  padding: 6px 14px;
  background: #ff7755;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 15px;
}
.refresh-btn:hover{background:#ff5533;}

/* 左上角人物修复不遮眼 */
.myAvatarBox{position:fixed;top:70px;left:15px;z-index:999;}
.baseAvatar{width:50px;height:62px;position:relative;}
.avaHead{width:46px;height:34px;background:#ffd6dc;border-radius:50%;position:absolute;top:0;left:2px;}
.avaHair{width:42px;height:16px;background:#222;border-radius:50%;position:absolute;top:-4px;left:4px;}
.eyeL,.eyeR{width:5px;height:6px;background:#111;border-radius:50%;position:absolute;top:14px;}
.eyeL{left:12px;}.eyeR{right:12px;}
.blushL,.blushR{width:6px;height:4px;background:#ffb8c8;border-radius:50%;position:absolute;top:20px;opacity:0.6;}
.blushL{left:6px;}.blushR{right:6px;}
.avaBodyBase{width:40px;height:22px;background:#ffe4eb;border-radius:10px;position:absolute;bottom:0;left:5px;}
.clothLayer{width:40px;height:22px;position:absolute;bottom:0;left:5px;border-radius:10px;}
.cloth0{display:none;}
.cloth1{background:#ff99bb;}
.cloth2{background:#88b8ff;}
.cloth3{background:#ffcc88;}

.page{display:none;width:100vw;height:100vh;padding:20px;}
.active{display:block;}
.top-bar{position:fixed;top:0;left:0;width:100%;background:#fff;padding:10px 20px;box-shadow:0 2px 8px;z-index:99;}
.back-btn{padding:6px 16px;border:none;border-radius:8px;background:#666;color:white;cursor:pointer;}

/* 精致建筑大地图 */
#mapPage{background:#98d8aa;text-align:center;padding-top:90px;overflow:hidden;}
.map-title{font-size:36px;color:#206030;text-shadow:2px 2px #fff;margin-bottom:40px;}
.building{display:inline-block;margin:15px 20px;cursor:pointer;transition:transform 0.2s;}
.building:hover{transform:scale(1.08);}

/* 图书馆-学习楼 */
.lib{width:160px;height:180px;position:relative;}
.lib-body{width:140px;height:130px;background:#4488cc;border-radius:10px 10px 0 0;margin:0 auto;}
.lib-roof{width:160px;height:40px;background:#225599;clip-path:polygon(0 100%,50% 0,100% 100%);}
.lib-sign{position:absolute;top:65px;width:140px;text-align:center;color:white;font-weight:bold;}

/* 休息酒店 */
.hotel{width:160px;height:180px;position:relative;}
.hotel-body{width:140px;height:130px;background:#77bb77;border-radius:10px 10px 0 0;margin:0 auto;}
.hotel-roof{width:160px;height:40px;background:#337733;clip-path:polygon(0 100%,50% 0,100% 100%);}
.hotel-sign{position:absolute;top:65px;width:140px;text-align:center;color:white;font-weight:bold;}

/* 高级餐厅 */
.restau{width:160px;height:180px;position:relative;}
.restau-body{width:140px;height:130px;background:#cc77aa;border-radius:10px 10px 0 0;margin:0 auto;}
.restau-roof{width:160px;height:40px;background:#994477;clip-path:polygon(0 100%,50% 0,100% 100%);}
.restau-sign{position:absolute;top:65px;width:140px;text-align:center;color:white;font-weight:bold;}

/* 服装店 */
.shop-build{width:130px;height:150px;position:relative;}
.shop-body{width:110px;height:110px;background:#ffbb44;border-radius:10px;margin:0 auto;}
.shop-sign{position:absolute;top:40px;width:110px;text-align:center;color:#333;font-weight:bold;}

/* 排行榜高塔 */
.rank-tower{width:110px;height:170px;position:relative;}
.tower-body{width:90px;height:130px;background:#ff6666;border-radius:8px;margin:0 auto;}
.rank-sign{position:absolute;top:50px;width:90px;text-align:center;color:white;font-weight:bold;}

/* 私人小屋 */
.private-house{width:130px;height:150px;position:relative;}
.house-body{width:110px;height:100px;background:#9966ff;border-radius:10px;margin:0 auto;}
.house-sign{position:absolute;top:35px;width:110px;text-align:center;color:white;font-weight:bold;}

/* 学习教室 */
#studyPage{background:#d7e9f5;text-align:center;padding-top:80px;}
.classroomBg{width:90%;height:420px;margin:0 auto;background:#c9e8c9;border:20px solid #8fbb8f;border-radius:16px;position:relative;overflow:hidden;}
.blackboard{width:70%;height:60px;background:#264d26;border-radius:10px;margin:15px auto;line-height:60px;color:#a2e8a2;}
.deskRow{display:flex;justify-content:center;gap:16px;margin:18px 0;}
.desk{width:60px;height:42px;background:#b98c60;border-radius:8px;cursor:pointer;position:relative;}
.desk:hover{transform:scale(1.08);}
.seatAvatar{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:28px;height:34px;display:none;}
.timer-wrap{margin-top:20px;}
.timer-box{font-size:50px;margin:10px;}

/* 休息室 */
#restPage{background:#f0e9ff;text-align:center;padding-top:80px;}
.sofa{width:220px;height:110px;background:#a888cc;border-radius:30px;margin:40px auto;position:relative;}
.bed{width:260px;height:130px;background:#88bbee;border-radius:20px;margin:30px auto;position:relative;}
.restChar{width:40px;height:48px;position:absolute;}

/* 餐厅聊天房 */
#chatPage{background:#ffeedd;text-align:center;padding-top:80px;}
.cafeTable{width:160px;height:90px;background:#bb8855;border-radius:12px;margin:20px auto;display:inline-block;}
.foodItem{padding:8px 16px;background:#ffd899;border-radius:8px;margin:8px;display:inline-block;cursor:pointer;}

/* 商城排行私人房 */
#shopPage{background:#fff8e5;text-align:center;padding-top:80px;}
.cloth-item{padding:15px 20px;margin:10px;background:#ffe8b0;border-radius:10px;display:inline-block;cursor:pointer;}
#rankPage{background:#fff0f0;text-align:center;padding-top:80px;}
.rank-box{max-width:380px;margin:20px auto;background:#fff;padding:20px;border-radius:16px;}
#privatePage{background:#eef0ff;text-align:center;padding-top:80px;}
.decoBtn{padding:10px 18px;margin:8px;background:#bbaaff;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>

<!-- 右上角刷新按钮 -->
<button class="refresh-btn" onclick="location.reload()">🔄 刷新页面</button>

<!-- 左上角人物 -->
<div class="myAvatarBox">
<div class="baseAvatar">
  <div class="avaHair"></div>
  <div class="avaHead">
    <div class="eyeL"></div><div class="eyeR"></div>
    <div class="blushL"></div><div class="blushR"></div>
  </div>
  <div class="avaBodyBase"></div>
  <div class="clothLayer cloth0" id="nowCloth"></div>
</div>
</div>

<div class="top-bar">
<button class="back-btn" onclick="goMap()">返回地图</button>
&nbsp;&nbsp;💰金币：<span id="coinNum">0</span>
</div>

<!-- 精致建筑大地图 -->
<div id="mapPage" class="page active">
<h1 class="map-title">🌍 Funstudying 欢乐大世界</h1>

<div class="building" onclick="goPage('studyPage')">
  <div class="lib">
    <div class="lib-roof"></div>
    <div class="lib-body"></div>
    <div class="lib-sign">📖 图书馆学习室</div>
  </div>
</div>

<div class="building" onclick="goPage('restPage')">
  <div class="hotel">
    <div class="hotel-roof"></div>
    <div class="hotel-body"></div>
    <div class="hotel-sign">🛏 休息大酒店</div>
  </div>
</div>

<div class="building" onclick="goPage('chatPage')">
  <div class="restau">
    <div class="restau-roof"></div>
    <div class="restau-body"></div>
    <div class="restau-sign">🍽 高级聊天餐厅</div>
  </div>
</div>
<br>

<div class="building" onclick="goPage('shopPage')">
  <div class="shop-build">
    <div class="shop-body"></div>
    <div class="shop-sign">👗 换装服装店</div>
  </div>
</div>

<div class="building" onclick="goPage('rankPage');showRank();">
  <div class="rank-tower">
    <div class="tower-body"></div>
    <div class="rank-sign">🏆 排行榜高塔</div>
  </div>
</div>

<div class="building" onclick="openPrivateCheck()">
  <div class="private-house">
    <div class="house-body"></div>
    <div class="house-sign">🏠 私人专属小屋</div>
  </div>
</div>
</div>

<!-- 学习教室 -->
<div id="studyPage" class="page">
<div class="classroomBg">
<div class="blackboard">今日专心读书</div>
<div class="deskRow">
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
</div>
<div class="deskRow">
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
</div>
</div>
<div class="timer-wrap">
<div class="timer-box" id="timer">25:00</div>
<button onclick="startTimer()">开始</button>
<button onclick="pauseTimer()">暂停</button>
<button id="rewardBtn" disabled onclick="endStudy()">完成+50金币</button>
</div>
</div>

<!-- 休息室 -->
<div id="restPage" class="page">
<h1>🛏 休息大酒店</h1>
<div class="sofa"><div class="restChar" style="top:30px;left:90px;"></div></div>
<div class="bed"><div class="restChar" style="top:40px;left:110px;"></div></div>
<p>在这里放松休息，舒缓眼睛～</p>
</div>

<!-- 餐厅聊天房 -->
<div id="chatPage" class="page">
<h1>🍽 高级聊天餐厅</h1>
<div class="cafeTable"></div>
<div class="cafeTable"></div><br>
<div class="foodItem" onclick="buyFood(20)">奶茶 20金币</div>
<div class="foodItem" onclick="buyFood(30)">蛋糕 30金币</div>
<textarea style="width:70%;height:150px;margin-top:20px;" placeholder="在这里和朋友聊天、一起放松～"></textarea>
</div>

<!-- 换装商城 -->
<div id="shopPage" class="page">
<h1>👗 换装服装店（不遮眼睛）</h1>
<div class="cloth-item" onclick="buyCloth(100,1)">粉色校服 100金币</div>
<div class="cloth-item" onclick="buyCloth(150,2)">蓝色运动服 150金币</div>
<div class="cloth-item" onclick="buyCloth(200,3)">可爱洋装 200金币</div>
</div>

<!-- 排行榜 -->
<div id="rankPage" class="page">
<h1>🏆 金币排行榜高塔</h1>
<div class="rank-box" id="rankList"></div>
<input id="userName" placeholder="输入昵称">
<button onclick="saveMyName()">保存昵称</button>
</div>

<!-- 私人房间 -->
<div id="privatePage" class="page">
<h1>🏠 我的私人专属小屋</h1>
<p>自由布置你的专属空间</p>
<button class="decoBtn">摆放书桌</button>
<button class="decoBtn">摆放地毯</button>
<button class="decoBtn">摆放台灯</button>
<p style="margin-top:30px;">可以邀请好友进来一起自习聊天</p>
</div>

<script>
let coins = parseInt(localStorage.getItem("myCoin"))||0;
let clothId = parseInt(localStorage.getItem("myCloth"))||0;
let userName = localStorage.getItem("userName")||"同学";
let hasPrivate = localStorage.getItem("hasPrivate")==="1";

document.getElementById("coinNum").innerText=coins;
document.getElementById("nowCloth").className="clothLayer cloth"+clothId;

function goPage(id){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById(id).classList.add("active");}
function goMap(){goPage("mapPage");}

function sitDesk(d){let a=d.querySelector(".seatAvatar");a.style.display="block";}

let totalTime=1500,time=totalTime,run=false,timer;
const rewardBtn=document.getElementById("rewardBtn");rewardBtn.disabled=true;
function updateT(){let m=Math.floor(time/60),s=time%60;document.getElementById("timer").innerText=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);}
function startTimer(){if(run)return;run=1;timer=setInterval(()=>{if(time>0){time--;updateT();if(time<=0){clearInterval(timer);run=0;rewardBtn.disabled=false;}}},1000);}
function pauseTimer(){run=0;clearInterval(timer);}
function endStudy(){if(time>0){alert("必须学完25分钟！");return;}coins+=50;localStorage.setItem("myCoin",coins);document.getElementById("coinNum").innerText=coins;saveRank();alert("+50金币！");time=totalTime;updateT();rewardBtn.disabled=true;}

function buyCloth(p,cid){if(coins>=p){coins-=p;clothId=cid;localStorage.setItem("myCoin",coins);localStorage.setItem("myCloth",clothId);document.getElementById("coinNum").innerText=coins;document.getElementById("nowCloth").className="clothLayer cloth"+cid;alert("换装成功！");}else alert("金币不足");}
function buyFood(p){if(coins>=p){coins-=p;localStorage.setItem("myCoin",coins);document.getElementById("coinNum").innerText=coins;alert("购买小食成功！");}else alert("金币不够");}

function openPrivateCheck(){if(hasPrivate){goPage("privatePage");}else{if(coins>=300){coins-=300;localStorage.setItem("myCoin",coins);hasPrivate=true;localStorage.setItem("hasPrivate","1");document.getElementById("coinNum").innerText=coins;alert("消耗300金币开通私人小屋！");goPage("privatePage");}else alert("开通私人小屋需要300金币！");}}

function saveMyName(){let n=document.getElementById("userName").value.trim();if(n){userName=n;localStorage.setItem("userName",n);alert("昵称保存成功");}}
function saveRank(){let r=JSON.parse(localStorage.getItem("rankData")||"[]");let find=r.find(x=>x.name===userName);find?find.coins=coins:r.push({name:userName,coins:coins});r.sort((a,b)=>b.coins-a.coins);localStorage.setItem("rankData",JSON.stringify(r));}
function showRank(){let r=JSON.parse(localStorage.getItem("rankData")||"[]");let box=document.getElementById("rankList");box.innerHTML="";r.slice(0,10).forEach((it,i)=>box.innerHTML+=`<div>${i+1}.${it.name} - ${it.coins}金币</div>`);}

updateT();
</script>

</body>
  </html>
