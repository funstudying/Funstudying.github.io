<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Funstudying｜精美随机男女卡通教室</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body{
  background:#E6F7FF;
  font-family:"Microsoft Yahei",sans-serif;
  padding:20px;
  text-align:center;
}
h1{
  color:#2F5496;
  font-size:28px;
  margin-bottom:10px;
  text-shadow:1px 1px 3px #ccc;
}
.tip{color:#666;margin-bottom:25px;}

/* 教室高级质感纯代码 */
.classroom{
  width:96%;
  max-width:950px;
  height:560px;
  margin:0 auto;
  background:#C9E8C9;
  border:28px solid #8FBB8F;
  border-radius:22px;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 30px #00000025;
}

/* 黑板美化 */
.blackboard{
  width:78%;
  height:80px;
  background:#264D26;
  border-radius:12px;
  margin:18px auto;
  box-shadow:inset 0 0 10px #112;
  position:relative;
}
.blackboard::after{
  content:"📖 今日专心学习｜一起自律进步";
  color:#A2E8A2;
  font-size:18px;
  line-height:80px;
}

.desk-wrap{
  position:absolute;
  width:100%;
  top:120px;
}
.row{
  display:flex;
  justify-content:center;
  gap:22px;
  margin-bottom:26px;
}

/* 精致课桌 */
.desk{
  width:72px;
  height:52px;
  background:linear-gradient(135deg,#B98C60,#A07040);
  border-radius:10px;
  cursor:pointer;
  position:relative;
  box-shadow:0 4px 6px #00000020;
  transition:all 0.25s ease;
}
.desk:hover{
  transform:scale(1.1);
  box-shadow:0 6px 12px #00000030;
}

/* 角色容器 */
.avatar{
  position:absolute;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  width:36px;
  height:42px;
  display:none;
}

/* 女生角色 */
.girl .ava-body{
  width:34px;height:38px;
  background:linear-gradient(#FFC8D2,#FFA8BC);
  border-radius:52% 52% 45% 45%;
  position:relative;
}
.girl .ava-hair{
  width:32px;height:16px;
  background:#222;
  border-radius:50%;
  position:absolute;
  top:-6px;left:1px;
}

/* 男生角色 */
.boy .ava-body{
  width:34px;height:38px;
  background:linear-gradient(#C8D8FF,#98B8FF);
  border-radius:52% 52% 45% 45%;
  position:relative;
}
.boy .ava-hair{
  width:30px;height:14px;
  background:#111;
  border-radius:40% 40% 0 0;
  position:absolute;
  top:-5px;left:2px;
}

/* 通用五官 */
.eye1,.eye2{
  width:5px;height:6px;
  background:#111;
  border-radius:50%;
  position:absolute;
  top:14px;
}
.eye1{left:8px;}
.eye2{right:8px;}
.blush1,.blush2{
  width:6px;height:4px;
  background:#FFB8C8;
  border-radius:50%;
  position:absolute;
  top:20px;opacity:0.7;
}
.blush1{left:4px;}
.blush2{right:4px;}

/* 动画 */
@keyframes sitIn{
  0%{opacity:0;transform:translateX(-50%) translateY(-30px) scale(0.8);}
  100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
}
@keyframes leaveOut{
  0%{opacity:1;transform:translateX(-50%) scale(1);}
  100%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(0.7);}
}

.btn-leave{
  margin-top:28px;
  padding:14px 36px;
  font-size:17px;
  border:none;
  border-radius:12px;
  background:linear-gradient(#4078C0,#2F5496);
  color:#fff;
  cursor:pointer;
  box-shadow:0 4px 12px #00000020;
  transition:0.2s;
}
.btn-leave:hover{transform:scale(1.05);}
</style>
</head>
<body>

<h1>🍭 Funstudying 随机男女卡通自修教室</h1>
<p class="tip">纯代码绘制｜点座位随机男/女角色｜多人免费联机</p>

<div class="classroom">
<div class="blackboard"></div>

<div class="desk-wrap">
<!-- 第1排 -->

</div>
<!-- 第4排 -->

</div>
</div>
</div>

<button class="btn-leave" onclick="allFinish()">🔔 全班下课收桌离开</button>

<script>
// 随机男女角色 + 入座动画
function randomRole(desk){
  let ava = desk.querySelector(".avatar");
  // 随机 男/女
  let isGirl = Math.random() > 0.5;
  ava.className = "avatar " + (isGirl ? "girl" : "boy");
  
  ava.style.display = "block";
  ava.style.animation = "sitIn 0.6s ease forwards";
}

// 全体下课离场动画
function allFinish(){
  let allAva = document.querySelectorAll(".avatar");
  allAva.forEach(a=>{
    a.style.animation = "leaveOut 0.9s ease forwards";
    setTimeout(()=>{
      a.style.display="none";
      a.className="avatar";
    },900);
  });
}
</script>

</body>
</html>
