<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funstudying｜大世界地圖 房間+金幣+換裝</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:"微軟雅黑",sans-serif;
  background:#eef7ff;
  overflow:hidden;
}

/* 頁面容器 */
.page{display:none;width:100vw;height:100vh;padding:20px;}
.active{display:block;}

/* 大地圖頁面 */
#mapPage{
  background:#bde2bc;
  text-align:center;
}
.map-title{font-size:32px;margin:30px 0;color:#226622;}
.room-btn{
  width:180px;height:140px;
  margin:20px;
  border:none;border-radius:20px;
  font-size:20px;color:white;
  cursor:pointer;
}
.study-room{background:#4488cc;}
.rest-room{background:#77bb77;}
.chat-room{background:#cc77aa;}
.shop-room{background:#ffbb44;color:#333;}

/* 頂部金幣欄 */
.top-bar{
  position:fixed;top:0;left:0;width:100%;
  background:#fff;padding:10px 20px;
  font-size:18px;
  box-shadow:0 2px 8px #ccc;
  z-index:99;
}
.back-btn{
  padding:6px 16px;border:none;border-radius:8px;
  background:#666;color:white;cursor:pointer;
}

/* 學習房 */
#studyPage{background:#d7e9f5;text-align:center;padding-top:80px;}
.timer-box{font-size:60px;margin:30px;}
.ctrl-btn{padding:10px 24px;margin:8px;border:none;border-radius:10px;cursor:pointer;}

/* 休息室 */
#restPage{background:#e9f5d7;text-align:center;padding-top:80px;}

/* 聊天房 */
#chatPage{background:#f5e9f8;text-align:center;padding-top:80px;}

/* 商城換裝 */
#shopPage{background:#fff8e5;text-align:center;padding-top:80px;}
.cloth-item{
  width:120px;padding:15px;margin:10px;border-radius:12px;
  background:#ffe8b0;display:inline-block;cursor:pointer;
}
</style>
</head>
<body>

<!-- 頂部金幣列 -->
<div class="top-bar">
  <button class="back-btn" onclick="goMap()">返回地圖</button>
  &nbsp;&nbsp;💰 你的金幣：<span id="coinNum">0</span>
</div>

<!-- 1.大世界地圖 -->
<div id="mapPage" class="page active">
  <div class="map-title">🌍 歡迎來到 Funstudying 大世界</div>
  <br>
  <button class="room-btn study-room" onclick="goPage('studyPage')">📚 專業學習房</button>
  <button class="room-btn rest-room" onclick="goPage('restPage')">☁️ 放鬆休息室</button>
  <br>
  <button class="room-btn chat-room" onclick="goPage('chatPage')">💬 好友娛樂聊天室</button>
  <button class="room-btn shop-room" onclick="goPage('shopPage')">👗 換裝金幣商城</button>
</div>

<!-- 2.學習房 -->
<div id="studyPage" class="page">
  <h1>📖 專心學習計時室</h1>
  <div class="timer-box" id="timer">25:00</div>
  <button class="ctrl-btn" onclick="startTimer()">開始專心</button>
  <button class="ctrl-btn" onclick="pauseTimer()">暫停</button>
  <button class="ctrl-btn" onclick="endStudy()">完成領金幣+50</button>
</div>

<!-- 3.休息室 -->
<div id="restPage" class="page">
  <h1>☁️ 輕鬆休息空間</h1>
  <p style="margin-top:30px;font-size:20px;">這裡可以放鬆心情、緩和眼睛</p>
</div>

<!-- 4.聊天娛樂房 -->
<div id="chatPage" class="page">
  <h1>💬 好友聊天娛樂房</h1>
  <textarea style="width:80%;height:180px;margin-top:30px;padding:15px;border-radius:12px;" placeholder="在這裡和朋友聊天打氣～"></textarea>
</div>

<!-- 5.換裝商城 -->
<div id="shopPage" class="page">
  <h1>👗 金幣換裝商城</h1>
  <div class="cloth-item" onclick="buyCloth(100)">粉紅校服 💰100</div>
  <div class="cloth-item" onclick="buyCloth(150)">藍色運動服 💰150</div>
  <div class="cloth-item" onclick="buyCloth(200)">可愛洋裝 💰200</div>
  <p style="margin-top:30px;">累積學習金幣，解鎖更多造型！</p>
</div>

<script>
// 本地儲存金幣
let coins = parseInt(localStorage.getItem("myCoin")) || 0;
document.getElementById("coinNum").innerText = coins;

// 頁面切換
function goPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goMap(){goPage("mapPage");}

// 計時器
let time = 25*60;
let run = false;
let timer;
function updateT(){
  let m = Math.floor(time/60),s=time%60;
  document.getElementById("timer").innerText=(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);
}
function startTimer(){
  if(run)return;run=true;
  timer=setInterval(()=>{if(time>0)time--;updateT();},1000);
}
function pauseTimer(){run=false;clearInterval(timer);}

// 學習完成領金幣
function endStudy(){
  pauseTimer();
  coins += 50;
  localStorage.setItem("myCoin",coins);
  document.getElementById("coinNum").innerText=coins;
  alert("學習完成！獲得 50 金幣✨");
  time=25*60;updateT();
}

// 買衣服扣金幣
function buyCloth(price){
  if(coins>=price){
    coins -= price;
    localStorage.setItem("myCoin",coins);
    document.getElementById("coinNum").innerText=coins;
    alert("購買成功！已換上新衣服～");
  }else{
    alert("金幣不足！快去學習掙錢💪");
  }
}
updateT();
</script>

</body>
</html>
