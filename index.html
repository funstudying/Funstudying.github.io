<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Funstudying｜純代碼卡通多人自修室</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background-color: #e8f4ff;
  font-family: "Microsoft Yahei", sans-serif;
  padding: 20px;
  text-align: center;
}
h1 {
  color: #4477aa;
  margin-bottom: 12px;
}
p.tip {
  color:#666;
  margin-bottom:20px;
}

/* 純代碼大教室外框＋地板 */
.classroom {
  width: 95%;
  max-width: 900px;
  height: 520px;
  margin: 0 auto;
  background: #c7e9c7;
  border: 24px solid #96bb96;
  border-radius: 18px;
  position: relative;
  overflow: hidden;
}

/* 黑板純代碼 */
.blackboard {
  width: 75%;
  height: 70px;
  background: #2e4d2e;
  border-radius: 10px;
  margin: 15px auto;
}

/* 桌子行列排版 */
.desk-container {
  position: absolute;
  width: 100%;
  top: 110px;
}
.row {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-bottom: 22px;
}

/* 精美課桌樣式 */
.desk {
  width: 66px;
  height: 48px;
  background: #b98c60;
  border-radius: 8px;
  cursor: pointer;
  position: relative;
  box-shadow: 0 3px 4px #8885;
  transition: transform 0.2s;
}
.desk:hover {
  transform: scale(1.08);
}

/* 超可愛精緻卡通小人 純CSS */
.avatar {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px;
  height: 38px;
  display: none;
}
/* 身體 */
.avatar-body {
  width: 30px;
  height: 34px;
  background: #ffc9d3;
  border-radius: 50% 50% 42% 42%;
  position: relative;
}
/* 頭髮 */
.avatar-hair {
  width: 28px;
  height: 14px;
  background: #333;
  border-radius: 50%;
  position: absolute;
  top: -5px;
  left: 1px;
}
/* 眼睛 */
.avatar-eye1,.avatar-eye2 {
  width: 4px;
  height: 4px;
  background: #222;
  border-radius: 50%;
  position: absolute;
  top: 12px;
}
.avatar-eye1 { left: 7px; }
.avatar-eye2 { right: 7px; }

/* 入座動畫 */
@keyframes sitAnimate {
  0% { opacity:0; transform: translateX(-50%) translateY(-20px); }
  100% { opacity:1; transform: translateX(-50%) translateY(0); }
}
/* 下课離開動畫 */
keyframes leaveAnimate {
  0% { opacity:1; }
  100% { opacity:0; transform: translateX(-50%) translateY(-40px); }
}

.btn-end {
  margin-top:25px;
  padding:12px 30px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#4477aa;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>🍭 Funstudying 可愛卡通自修室</h1>
<p class="tip">全代碼繪製｜點擊桌子入座｜下課自動收桌離開</p>

<div class="classroom">
  <!-- 黑板 -->
  <div class="blackboard"></div>

  <!-- 超多課桌區域 -->
  <div class="desk-container">

    <!-- 第一排 -->
    <div class="row">
      <div class="desk" onclick="sit(this)">
        <div class="avatar">
          <div class="avatar-body">
            <div class="avatar-hair"></div>
            <div class="avatar-eye1"></div>
            <div class="avatar-eye2"></div>
          </div>
        </div>
      </div>
      <div class="desk" onclick="sit(this)">
        <div class="avatar">
          <div class="avatar-body">
            <div class="avatar-hair"></div>
            <div class="avatar-eye1"></div>
            <div class="avatar-eye2"></div>
          </div>
        </div>
      </div>
      <div class="desk" onclick="sit(this)">
        <div class="avatar">
          <div class="avatar-body">
            <div class="avatar-hair"></div>
            <div class="avatar-eye1"></div>
            <div class="avatar-eye2"></div>
          </div>
        </div>
      </div>
      <div class="desk" onclick="sit(this)">
        <div class="avatar">
          <div class="avatar-body">
            <div class="avatar-hair"></div>
            <div class="avatar-eye1"></div>
            <div class="avatar-eye2"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 第二排 -->
    <div class="row">
      <div class="desk" onclick="sit(this)"><div class="avatar"><div class="avatar-body"><div class="avatar-hair"></div><div class="avatar-eye1"></div><div class="avatar-eye2"></div></div></div></div>
      <div class="desk" onclick="sit(this)"><div class="avatar"><div class="avatar-body"><div class="avatar-hair"></div><div class="avatar-eye1"></div><div class="avatar-eye2"></div></div></div></div>
      <div class="desk" onclick="sit(this)"><div class="avatar"><div class="avatar-body"><div class="avatar-hair"></div><div class="avatar-eye1"></div><div class="avatar-eye2"></div></div></div></div>
      <div class="desk" onclick="sit(this)"><div class="avatar"><div class="avatar-body"><div class="avatar-hair"></div><div class="avatar-eye1"></div><div class="avatar-eye2"></div></div></div></div>
    </div>

    <!-- 第三排 -->
    <div class="row">
      <div class="desk" onclick="sit(this)"><div class="avatar"><div class="avatar-body"><div class="avatar-hair"></div><div class="avatar-eye1"></div><div class="avatar-eye2"></div></div></div></div>
      <div class="desk" onclick="sit(this)"><div class="avatar"><div class="avatar-body"><div class="avatar-hair"></div><div class="avatar-eye1"></div><div class="avatar-eye2"></div></div></div></div>
      <div class="desk" onclick="sit(this)"><div class="avatar"><div class="avatar-body"><div class="avatar-hair"></div><div class="avatar-eye1"></div><div class="avatar-eye2"></div></div></div></div>
      <div class="desk" onclick="sit(this)"><div class="avatar"><div class="avatar-body"><div class="avatar-hair"></div><div class="avatar-eye1"></div><div class="avatar-eye2"></div></div></div></div>
    </div>

  </div>
</div>

<button class="btn-end" onclick="allLeave()">🔔 下課全體收桌離開</button>

<script>
// 點桌子入座
function sit(deskEl){
  let ava = deskEl.querySelector(".avatar");
  ava.style.display = "block";
  ava.style.animation = "sitAnimate 0.5s ease forwards";
}

// 全部下課離開
function allLeave(){
  let allAvatars = document.querySelectorAll(".avatar");
  allAvatars.forEach(ava=>{
    ava.style.animation = "leaveAnimate 0.8s ease forwards";
    setTimeout(()=>ava.style.display="none",800);
  });
}
</script>

</body>
</html>
