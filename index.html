<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funstudying 终极修复版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"微软雅黑",sans-serif;overflow:hidden;}

.refresh-btn{position:fixed;top:12px;right:20px;z-index:9999;padding:6px 14px;background:#ff7755;color:white;border:none;border-radius:8px;cursor:pointer;}

.myAvatarBox{position:fixed;top:70px;left:15px;z-index:999;}
.baseAvatar{width:52px;height:64px;position:relative;}
.avaHead{width:48px;height:36px;background:#ffd9df;border-radius:50%;position:absolute;top:0;left:2px;}
.avaHair{width:44px;height:18px;background:#222;border-radius:50%;top:-4px;left:4px;position:absolute;}
.eyeL,.eyeR{width:5px;height:6px;background:#111;top:15px;position:absolute;border-radius:50%;}
.eyeL{left:13px;}.eyeR{right:13px;}
.blushL,.blushR{width:7px;height:4px;background:#ffb8c8;top:22px;opacity:0.6;border-radius:50%;position:absolute;}
.avaBodyBase{width:42px;height:24px;background:#ffe4eb;border-radius:10px;position:absolute;bottom:0;left:5px;}
.clothLayer{width:42px;height:24px;position:absolute;bottom:0;left:5px;border-radius:10px;}
.cloth0{display:none;}
.cloth1{background:linear-gradient(#ffb3cc,#ff88aa);border-top:2px solid #fff5f8;}
.cloth2{background:linear-gradient(#a0c8ff,#70a8ee);border-top:2px solid #e8f2ff;}
.cloth3{background:linear-gradient(#ffe2b8,#ffcd88);border-top:2px solid #fff3e0;}

.page{display:none;width:100vw;height:100vh;padding:20px;}
.active{display:block;}
.top-bar{position:fixed;top:0;left:0;width:100%;background:#fff;padding:10px 20px;box-shadow:0 2px 8px;z-index:99;}
.back-btn{padding:6px 16px;border:none;border-radius:8px;background:#666;color:white;cursor:pointer;}

#mapPage{background:#98d8aa;text-align:center;padding-top:90px;}
.map-title{font-size:36px;color:#206030;margin-bottom:40px;}
.building{display:inline-block;margin:15px 20px;cursor:pointer;transition:0.2s;}
.building:hover{transform:scale(1.08);}
.lib,.hotel,.restau,.shop-build,.rank-tower,.private-house{position:relative;}
.lib{width:160px;height:180px;}
.lib-body{width:140px;height:130px;background:#4488cc;margin:0 auto;border-radius:10px 10px 0 0;}
.lib-roof{width:160px;height:40px;background:#225599;clip-path:polygon(0 100%,50% 0,100% 100%);}
.lib-sign{position:absolute;top:65px;width:140px;text-align:center;color:white;font-weight:bold;}
.hotel{width:160px;height:180px;}
.hotel-body{width:140px;height:130px;background:#77bb77;margin:0 auto;border-radius:10px 10px 0 0;}
.hotel-roof{width:160px;height:40px;background:#337733;clip-path:polygon(0 100%,50% 0,100% 100%);}
.hotel-sign{position:absolute;top:65px;width:140px;text-align:center;color:white;font-weight:bold;}
.restau{width:160px;height:180px;}
.restau-body{width:140px;height:130px;background:#cc77aa;margin:0 auto;border-radius:10px 10px 0 0;}
.restau-roof{width:160px;height:40px;background:#994477;clip-path:polygon(0 100%,50% 0,100% 100%);}
.restau-sign{position:absolute;top:65px;width:140px;text-align:center;color:white;font-weight:bold;}
.shop-build{width:130px;height:150px;}
.shop-body{width:110px;height:110px;background:#ffbb44;border-radius:10px;margin:0 auto;}
.shop-sign{position:absolute;top:40px;width:110px;text-align:center;color:#333;font-weight:bold;}
.rank-tower{width:110px;height:170px;}
.tower-body{width:90px;height:130px;background:#ff6666;border-radius:8px;margin:0 auto;}
.rank-sign{position:absolute;top:50px;width:90px;text-align:center;color:white;font-weight:bold;}
.private-house{width:130px;height:150px;}
.house-body{width:110px;height:100px;background:#9966ff;border-radius:10px;margin:0 auto;}
.house-sign{position:absolute;top:35px;width:110px;text-align:center;color:white;font-weight:bold;}

#studyPage{background:#d7e9f5;text-align:center;padding-top:80px;}
.classroomBg{width:90%;height:420px;margin:0 auto;background:#c9e8c9;border:20px solid #8fbb8f;border-radius:16px;position:relative;}
.blackboard{width:70%;height:60px;background:#264d26;border-radius:10px;margin:15px auto;line-height:60px;color:#a2e8a2;}
.deskRow{display:flex;justify-content:center;gap:16px;margin:18px 0;}
.desk{width:60px;height:42px;background:#b98c60;border-radius:8px;cursor:pointer;position:relative;}
.seatAvatar{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:28px;height:34px;display:none;background:#ffc9d3;border-radius:50% 50% 40% 40%;}

/* =========休息室 修复坐姿小人========= */
#restPage{background:#f0e9ff;text-align:center;padding-top:80px;}
.sofa{width:240px;height:120px;background:#a888cc;border-radius:40px;margin:40px auto;position:relative;cursor:pointer;}
.bed{width:280px;height:140px;background:#88bbee;border-radius:20px;margin:30px auto;position:relative;cursor:pointer;}
/* 完整坐姿人形 不是小点 */
.sit-person{width:50px;height:60px;position:absolute;background:#ffd9df;border-radius:50% 50% 30% 30%;display:none;}

/* 私人房间 极简自动摆放 不用拖拽 */
#privatePage{text-align:center;padding-top:70px;}
.room-area{width:85%;height:320px;border:2px solid #ccc;border-radius:16px;margin:20px auto;position:relative;background:#f8f9ff;}
.furn{position:absolute;border-radius:8px;}
.f-desk{width:70px;height:45px;background:#b98c60;left:80px;top:80px;}
.f-lamp{width:35px;height:50px;background:#ffdd77;left:180px;top:120px;}
.f-rug{width:130px;height:80px;background:#ccbbee;left:60px;top:200px;border-radius:20px;}
.add-btn{padding:8px 10px;margin:3px;border:none;border-radius:6px;cursor:pointer;background:#ddd;}
</style>
</head>
<body>
<button class="refresh-btn" onclick="location.reload()">🔄刷新</button>

<div class="myAvatarBox">
<div class="baseAvatar">
  <div class="avaHair"></div>
  <div class="avaHead"><div class="eyeL"></div><div class="eyeR"></div><div class="blushL"></div><div class="blushR"></div></div>
  <div class="avaBodyBase"></div>
  <div class="clothLayer cloth0" id="nowCloth"></div>
</div>
</div>

<div class="top-bar"><button class="back-btn" onclick="goMap()">返回地图</button>&nbsp;💰金币:<span id="coinNum">0</span></div>

<div id="mapPage" class="page active">
<h1 class="map-title">🌍Funstudying大世界</h1>
<div class="building" onclick="goPage('studyPage')"><div class="lib"><div class="lib-roof"></div><div class="lib-body"></div><div class="lib-sign">📖图书馆</div></div></div>
<div class="building" onclick="goPage('restPage')"><div class="hotel"><div class="hotel-roof"></div><div class="hotel-body"></div><div class="hotel-sign">🛏休息室</div></div></div>
<div class="building" onclick="goPage('chatPage')"><div class="restau"><div class="restau-roof"></div><div class="restau-body"></div><div class="restau-sign">🍽餐厅</div></div></div><br>
<div class="building" onclick="goPage('shopPage')"><div class="shop-build"><div class="shop-body"></div><div class="shop-sign">👗服装店</div></div></div>
<div class="building" onclick="goPage('rankPage')"><div class="rank-tower"><div class="tower-body"></div><div class="rank-sign">🏆排行</div></div></div>
<div class="building" onclick="openPrivate()"><div class="private-house"><div class="house-body"></div><div class="house-sign">🏠私人小屋</div></div></div>
</div>

<div id="studyPage" class="page">
<div class="classroomBg">
<div class="blackboard">专心自习</div>
<div class="deskRow">
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
</div>
<div class="deskRow">
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
<div class="desk" onclick="sitDesk(this)"><div class="seatAvatar"></div></div>
</div>
</div>
<div style="margin-top:20px;">
<div id="timer">25:00</div>
<button onclick="startTimer()">开始</button>
<button onclick="pauseTimer()">暂停</button>
<button id="rewardBtn" disabled onclick="endStudy()">完成+50金币</button>
</div>
</div>

<!-- 休息室：坐姿小人修复 -->
<div id="restPage" class="page">
<h1>🛏休息大酒店</h1>
<div class="sofa" onclick="sitSofa()">
<div class="sit-person" style="left:95px;top:30px;"></div>
</div>
<div class="bed" onclick="sitBed()">
<div class="sit-person" style="left:115px;top:45px;"></div>
</div>
<p>点击沙发/床坐下休息</p>
</div>

<div id="chatPage" class="page"><h1>🍽高级餐厅</h1></div>
<div id="shopPage" class="page"><h1>👗服装店</h1>
<div onclick="buyCloth(100,1)">粉校服100</div>
<div onclick="buyCloth(150,2)">蓝运动150</div>
<div onclick="buyCloth(200,3)">奶油裙200</div>
</div>
<div id="rankPage" class="page"><h1>🏆排行榜</h1></div>

<!-- 私人房间：极简自动摆放 不用拖拽 -->
<div id="privatePage" class="page">
<h1>🏠我的私人小屋</h1>
<button class="add-btn" onclick="addDesk()">放书桌</button>
<button class="add-btn" onclick="addLamp()">放台灯</button>
<button class="add-btn" onclick="addRug()">放地毯</button>
<button class="add-btn" onclick="clearRoom()">清空全部</button>
<div class="room-area" id="roomBox"></div>
</div>

<script>
let coins=parseInt(localStorage.getItem("myCoin"))||0;
let clothId=parseInt(localStorage.getItem("myCloth"))||0;
let hasPrivate=localStorage.getItem("hasPrivate")==="1";
document.getElementById("coinNum").innerText=coins;
document.getElementById("nowCloth").className="clothLayer cloth"+clothId;

function goPage(x){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(x).classList.add('active');}
function goMap(){goPage('mapPage');}

//座位
function sitDesk(d){d.querySelector('.seatAvatar').style.display='block';}

//休息室坐姿
function sitSofa(){document.querySelector('.sofa .sit-person').style.display='block';}
function sitBed(){document.querySelector('.bed .sit-person').style.display='block';}

//计时器
let t=1500,run=false,timer;
const rb=document.getElementById('rewardBtn');rb.disabled=true;
function upTime(){let m=Math.floor(t/60),s=t%60;document.getElementById('timer').innerText=(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);}
function startTimer(){if(run)return;run=1;timer=setInterval(()=>{if(t>0){t--;upTime();if(t<=0){clearInterval(timer);run=0;rb.disabled=false;}}},1000);}
function pauseTimer(){run=0;clearInterval(timer);}
function endStudy(){if(t>0)return alert('学满25分钟才行');coins+=50;localStorage.setItem('myCoin',coins);document.getElementById('coinNum').innerText=coins;t=1500;upTime();rb.disabled=true;alert('+50金币');}

//服装
function buyCloth(p,c){if(coins>=p){coins-=p;clothId=c;localStorage.setItem('myCoin',coins);localStorage.setItem('myCloth',clothId);document.getElementById('coinNum').innerText=coins;document.getElementById('nowCloth').className='clothLayer cloth'+c;alert('换装成功');}}

//开私房
function openPrivate(){if(hasPrivate)goPage('privatePage');else{if(coins>=300){coins-=300;localStorage.setItem('myCoin',coins);hasPrivate=1;localStorage.setItem('hasPrivate','1');document.getElementById('coinNum').innerText=coins;goPage('privatePage');}}}

//私人房间极简自动摆放（不用拖拽！）
function addDesk(){let d=document.createElement('div');d.className='furn f-desk';document.getElementById('roomBox').appendChild(d);}
function addLamp(){let l=document.createElement('div');l.className='furn f-lamp';document.getElementById('roomBox').appendChild(l);}
function addRug(){let r=document.createElement('div');r.className='furn f-rug';document.getElementById('roomBox').appendChild(r);}
function clearRoom(){document.getElementById('roomBox').innerHTML='';}

upTime();
</script>
</body>
  </html>
